<svg width="720" height="420" viewBox="0 0 720 420" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
  .mono { font-family: 'Fira Code', 'Consolas', monospace; }
  .title { font-size: 14px; font-weight: 700; fill: #22c55e; }
  .head { font-size: 12px; font-weight: 700; fill: #9fb3c8; }
  .cell { font-size: 12px; fill: #d6e0e8; }
  .cell-alert { font-size: 12px; fill: #ffffff; font-weight: 700; }
  .pulse { animation: p 1.6s ease-in-out infinite; }
  @keyframes p { 0%,100%{opacity:1} 50%{opacity:.35} }
</style>
<filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
  <feGaussianBlur stdDeviation="3" result="b"/>
  <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
</defs>

<rect x="0" y="0" width="720" height="420" rx="12" fill="#0b0f14"/>
